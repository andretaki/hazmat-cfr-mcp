name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Secret scan
        run: npm run scan:secrets
      - name: CLI smoke test
        run: |
          node dist/cli.js lookup UN1090
          node dist/cli.js validate "UN1090, Acetone, 3, PG II"
          node dist/cli.js lq 3 II 1000 12 true
